<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Otavalango AR - Debug</title>

    <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.3.0/dist/aframe-master.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar-nft.js"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; font-family: sans-serif; }

      .arjs-loader {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.92); z-index: 9998;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
      }
      .arjs-loader p { color: white; font-size: 1em; text-align: center; line-height: 2; margin-bottom: 20px; }

      #start-btn {
        padding: 14px 32px; font-size: 16px;
        background: #28a745; color: white;
        border: none; border-radius: 10px;
        cursor: pointer; display: none;
      }

      #log {
        position: fixed; bottom: 0; left: 0; right: 0;
        z-index: 9999;
        background: rgba(0,0,0,0.82);
        color: #0f0; font-size: 11px;
        padding: 8px 10px;
        max-height: 40vh;
        overflow-y: auto;
        font-family: monospace;
        line-height: 1.6;
      }
    </style>
  </head>

  <body>

    <div class="arjs-loader" id="loader">
      <p id="loading-text">Cargando AR...<br/>Por favor espera...</p>
      <button id="start-btn">📷 Comenzar</button>
    </div>

    <div id="log">🔍 Iniciando...<br/></div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false;"
      renderer="logarithmicDepthBuffer: true; precision: medium;"
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

      <a-assets>
        <video
          id="mi-video"
          src="./assets/Loom_Operation_and_Direct_Gaze.mp4"
          preload="auto"
          loop muted playsinline webkit-playsinline>
        </video>
      </a-assets>

      <a-nft
        id="nft-marker"
        type="nft"
        url="./assets/otavalango-museo-viviente"
        smooth="true"
        smoothCount="10"
        smoothTolerance="0.01"
        smoothThreshold="5">

        <a-video
          src="#mi-video"
          width="1.6" height="0.9"
          position="0 0 0.1"
          rotation="-90 0 0">
        </a-video>

      </a-nft>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const scene       = document.querySelector("a-scene");
      const loader      = document.getElementById("loader");
      const loadingText = document.getElementById("loading-text");
      const startBtn    = document.getElementById("start-btn");
      const video       = document.getElementById("mi-video");
      const marker      = document.getElementById("nft-marker");
      const logDiv      = document.getElementById("log");

      function log(msg) {
        const time = new Date().toLocaleTimeString();
        logDiv.innerHTML += "[" + time + "] " + msg + "<br/>";
        logDiv.scrollTop = logDiv.scrollHeight;
      }

      log("Página cargada");

      // Verificar que los archivos NFT son accesibles
      const archivos = [
        "./assets/otavalango-museo-viviente.fset",
        "./assets/otavalango-museo-viviente.fset3",
        "./assets/otavalango-museo-viviente.iset"
      ];

      archivos.forEach(function(url) {
        fetch(url, { method: "HEAD" })
          .then(function(r) {
            const size = r.headers.get("content-length");
            const kb = size ? Math.round(size / 1024) + " KB" : "tamaño desconocido";
            log("✅ " + url.split("/").pop() + " → " + kb);
          })
          .catch(function(e) {
            log("❌ NO ENCONTRADO: " + url.split("/").pop());
          });
      });

      scene.addEventListener("loaded", function () {
        log("✅ Escena AR cargada");
        loadingText.innerHTML = "¡Listo!";
        startBtn.style.display = "block";
      });

      setTimeout(function () {
        if (loader.style.display !== "none") {
          log("⚠️ Timeout: mostrando botón de todas formas");
          loadingText.innerHTML = "Listo (timeout)";
          startBtn.style.display = "block";
        }
      }, 15000);

      startBtn.addEventListener("click", function () {
        loader.style.display = "none";
        log("▶️ Experiencia iniciada - apunta a la imagen");

        video.play().then(function() {
          video.pause();
          log("✅ Video pre-inicializado OK");
        }).catch(function(e) {
          log("⚠️ Video pre-init: " + e.message);
        });

        setTimeout(function () {
          document.querySelectorAll("video, canvas").forEach(function(el) {
            el.style.width = "100vw";
            el.style.height = "100vh";
            el.style.position = "fixed";
            el.style.top = "0"; el.style.left = "0";
            el.style.transform = "none";
            el.style.objectFit = "cover";
          });
        }, 300);
      });

      marker.addEventListener("markerFound", function () {
        log("🟢 ¡IMAGEN DETECTADA!");
        video.play().catch(function(e) { log("❌ Error video: " + e.message); });
      });

      marker.addEventListener("markerLost", function () {
        log("🔴 Imagen perdida");
        video.pause();
      });

      // Capturar errores globales
      window.addEventListener("error", function(e) {
        log("❌ ERROR: " + e.message);
      });

      window.addEventListener("unhandledrejection", function(e) {
        log("❌ PROMISE ERROR: " + e.reason);
      });
    </script>

  </body>
</html>
