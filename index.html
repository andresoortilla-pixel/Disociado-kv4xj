<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Otavalango AR</title>

    <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.3.0/dist/aframe-master.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar-nft.js"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #000;
      }

      /* Forzar escena a pantalla completa */
      a-scene {
        width: 100vw !important;
        height: 100vh !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
      }

      /* Video de la camara a pantalla completa */
      .arjs-video {
        width: 100vw !important;
        height: 100vh !important;
        object-fit: cover !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        transform: none !important;
      }

      #status {
        position: fixed;
        top: 10px;
        left: 10px;
        right: 10px;
        z-index: 9999;
        background: rgba(0,0,0,0.7);
        color: #fff;
        font-size: 13px;
        padding: 10px 14px;
        border-radius: 8px;
        line-height: 1.8;
        pointer-events: none;
      }

      #status.found {
        background: rgba(0,140,0,0.85);
      }

      .arjs-loader {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.88);
        z-index: 9998;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .arjs-loader div {
        text-align: center;
        font-size: 1.1em;
        color: #fff;
        padding: 24px;
        line-height: 2;
      }
    </style>
  </head>

  <body>

    <div class="arjs-loader" id="loader">
      <div>Cargando AR...<br/>Por favor espera...</div>
    </div>

    <div id="status">⏳ Iniciando cámara...</div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false;"
      renderer="logarithmicDepthBuffer: true; precision: medium;"
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

      <a-assets>
        <video
          id="mi-video"
          src="./assets/Loom_Operation_and_Direct_Gaze.mp4"
          preload="auto"
          loop
          muted
          playsinline
          webkit-playsinline>
        </video>
      </a-assets>

      <a-nft
        id="nft-marker"
        type="nft"
        url="./assets/otavalango-museo-viviente"
        smooth="true"
        smoothCount="10"
        smoothTolerance="0.01"
        smoothThreshold="5">

        <a-video
          src="#mi-video"
          width="1.6"
          height="0.9"
          position="0 0 0.1"
          rotation="-90 0 0">
        </a-video>

      </a-nft>

      <a-entity camera></a-entity>

    </a-scene>

    <script>
      const scene  = document.querySelector("a-scene");
      const loader = document.getElementById("loader");
      const video  = document.getElementById("mi-video");
      const marker = document.getElementById("nft-marker");
      const status = document.getElementById("status");

      scene.addEventListener("loaded", function () {
        loader.style.display = "none";
        status.innerText = "✅ Cámara activa\n🔍 Apunta a la imagen...";

        // Arreglar tamaño de todos los elementos de camara
        setTimeout(function() {
          document.querySelectorAll("video, canvas").forEach(function(el) {
            el.style.width      = "100vw";
            el.style.height     = "100vh";
            el.style.position   = "fixed";
            el.style.top        = "0";
            el.style.left       = "0";
            el.style.transform  = "none";
            el.style.objectFit  = "cover";
          });
        }, 500);
      });

      setTimeout(function () { loader.style.display = "none"; }, 10000);

      marker.addEventListener("markerFound", function () {
        status.className = "found";
        status.innerText = "🟢 ¡Imagen detectada! Reproduciendo video...";
        video.play().catch(function(e) {
          status.innerText = "🟢 Imagen detectada\n⚠️ Error al reproducir: " + e.message;
        });
      });

      marker.addEventListener("markerLost", function () {
        status.className = "";
        status.innerText = "🔴 Imagen perdida - Vuelve a apuntar";
        video.pause();
      });
    </script>

  </body>
</html>
