<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Museo Otavalango - Experiencia Completa</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background: #000; }
      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85); z-index: 9999;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
      }
      #start-btn {
        padding: 16px 40px; font-size: 18px;
        background: #28a745; color: white; border: none; border-radius: 12px; cursor: pointer;
      }
      #status {
        position: fixed; top: 10px; left: 10px; right: 10px;
        z-index: 9998; background: rgba(0,0,0,0.7); color: white;
        font-size: 14px; padding: 12px; border-radius: 8px;
        font-family: sans-serif; text-align: center; pointer-events: none;
      }
    </style>
  </head>

  <body>

    <div id="overlay">
      <button id="start-btn">📷 Dar permisos y Comenzar</button>
    </div>
    <div id="status">⏳ Cargando cámara...</div>

    <a-scene
      mindar-image="imageTargetSrc: ./assets/todos-los-marcadores.mind; autoStart: true;"
      color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="video-0" src="./assets/coraza.mp4" preload="auto" loop playsinline webkit-playsinline></video>
        <video id="video-1" src="./assets/sillon.mp4" preload="auto" loop playsinline webkit-playsinline></video>
        <video id="video-2" src="./assets/telar.mp4" preload="auto" loop playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#video-0" width="1" height="0.552" position="0 0 0"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-video src="#video-1" width="1" height="0.552" position="0 0 0"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2">
        <a-video src="#video-2" width="1" height="0.552" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const overlayEl = document.getElementById("overlay");
      const startBtn  = document.getElementById("start-btn");
      const statusEl  = document.getElementById("status");

      // Seleccionamos los targets y los videos
      const target0 = document.querySelector('[mindar-image-target="targetIndex: 0"]');
      const target1 = document.querySelector('[mindar-image-target="targetIndex: 1"]');
      const target2 = document.querySelector('[mindar-image-target="targetIndex: 2"]');
      const video0 = document.getElementById("video-0");
      const video1 = document.getElementById("video-1");
      const video2 = document.getElementById("video-2");

      // Botón de inicio: Desbloquea TODOS los videos
      startBtn.addEventListener("click", function () {
        overlayEl.style.display = "none";
        statusEl.innerText = "📷 Apunta la cámara a cualquier imagen del museo...";
        
        // Damos play y pause rápido a todos para obtener el permiso de audio/video
        video0.play().then(() => video0.pause()).catch(e => console.log(e));
        video1.play().then(() => video1.pause()).catch(e => console.log(e));
        video2.play().then(() => video2.pause()).catch(e => console.log(e));
      });

      // Lógica para la Imagen 0 (Coraza)
      target0.addEventListener("targetFound", function () {
        statusEl.style.background = "rgba(0,140,0,0.88)";
        statusEl.innerText = "🟢 ¡Coraza detectado!";
        video0.play();
      });
      target0.addEventListener("targetLost", function () {
        statusEl.style.background = "rgba(0,0,0,0.7)";
        statusEl.innerText = "📷 Apunta la cámara a cualquier imagen del museo...";
        video0.pause();
      });

      // Lógica para la Imagen 1 (Sillón)
      target1.addEventListener("targetFound", function () {
        statusEl.style.background = "rgba(0,140,0,0.88)";
        statusEl.innerText = "🟢 ¡Sillón detectado!";
        video1.play();
      });
      target1.addEventListener("targetLost", function () {
        statusEl.style.background = "rgba(0,0,0,0.7)";
        statusEl.innerText = "📷 Apunta la cámara a cualquier imagen del museo...";
        video1.pause();
      }); // AQUÍ FALTABA CERRAR ESTA FUNCIÓN

      // Lógica para la Imagen 2 (Telar)
      target2.addEventListener("targetFound", function () { // AQUÍ DEBE SER target2
        statusEl.style.background = "rgba(0,140,0,0.88)";
        statusEl.innerText = "🟢 ¡Telar detectado!";
        video2.play();
      });
      target2.addEventListener("targetLost", function () { // AQUÍ DEBE SER target2
        statusEl.style.background = "rgba(0,0,0,0.7)";
        statusEl.innerText = "📷 Apunta la cámara a cualquier imagen del museo...";
        video2.pause();
      });
    </script>

  </body>
</html>
