<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Otavalango AR - Corrección</title>

    <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.3.0/dist/aframe-master.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background: #000; }

      #status {
        position: fixed; top: 10px; left: 10px; right: 10px;
        z-index: 9999; background: rgba(0,0,0,0.75); color: white;
        font-size: 14px; padding: 12px; border-radius: 8px;
        pointer-events: none; text-align: center; font-family: sans-serif;
      }

      .arjs-loader {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-color: rgba(0,0,0,0.9); z-index: 9998;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        font-family: sans-serif;
      }

      /* CLAVE 2: Botón para dar permiso al navegador de reproducir video */
      #start-btn {
        margin-top: 20px; padding: 15px 30px; font-size: 18px;
        background: #28a745; color: white; border: none; border-radius: 8px;
        cursor: pointer; display: none;
      }
    </style>
  </head>

  <body>

    <div class="arjs-loader" id="loader">
      <div id="loading-text" style="color:white; font-size:1.2em; margin-bottom: 20px; text-align: center;">
        Cargando cámara y descriptores...<br>Esto puede tardar unos segundos.
      </div>
      <button id="start-btn">Comenzar Experiencia</button>
    </div>

    <div id="status">⏳ Iniciando cámara...</div>

    <a-scene
      vr-mode-ui="enabled: false;"
      renderer="logarithmicDepthBuffer: true; precision: medium;"
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

      <a-assets>
        <video
          id="mi-video"
          src="./assets/Loom_Operation_and_Direct_Gaze.mp4"
          preload="auto"
          loop
          muted
          playsinline
          webkit-playsinline>
        </video>
      </a-assets>

      <a-nft
        id="nft-marker"
        type="nft"
        url="./assets/otavalango-museo-viviente"
        emitevents="true" 
        smooth="true"
        smoothCount="10"
        smoothTolerance="0.01"
        smoothThreshold="5">

        <a-video
          src="#mi-video"
          width="160"
          height="90"
          position="0 0 0"
          rotation="-90 0 0">
        </a-video>

      </a-nft>

      <a-entity camera></a-entity>

    </a-scene>

    <script>
      const scene = document.querySelector("a-scene");
      const loader = document.getElementById("loader");
      const loadingText = document.getElementById("loading-text");
      const startBtn = document.getElementById("start-btn");
      const video = document.getElementById("mi-video");
      const marker = document.getElementById("nft-marker");
      const status = document.getElementById("status");

      // Cuando los elementos 3D cargan, mostramos el botón
      scene.addEventListener("loaded", function () {
        loadingText.innerHTML = "¡Cámara y archivos listos!";
        startBtn.style.display = "block";
      });

      // El usuario debe hacer clic para dar permiso al video
      startBtn.addEventListener("click", function() {
        loader.style.display = "none";
        status.innerText = "✅ Escena lista\n📷 Apunta la cámara a la imagen";
        
        // Truco para sortear el bloqueo de Safari/Chrome
        video.play().then(() => {
            video.pause();
        }).catch((e) => {
            console.log("Esperando detección para reproducir.");
        });
      });

      // Eventos de detección
      marker.addEventListener("markerFound", function () {
        status.style.background = "rgba(0, 150, 0, 0.85)";
        status.innerText = "🟢 ¡IMAGEN DETECTADA! Reproduciendo...";
        video.play();
      });

      marker.addEventListener("markerLost", function () {
        status.style.background = "rgba(0,0,0,0.75)";
        status.innerText = "🔴 Imagen perdida\n📷 Vuelve a apuntar";
        video.pause();
      });
    </script>
  </body>
</html>
