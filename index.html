<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Otavalango Museo Viviente AR</title>

    <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.6.0/dist/aframe-master.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

    <style>
      * { margin: 0; padding: 0; }
      .arjs-loader {
        height: 100%;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
        background-color: rgba(0, 0, 0, 0.8);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .arjs-loader div {
        text-align: center;
        font-size: 1.2em;
        color: white;
        padding: 20px;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">

    <div class="arjs-loader" id="loader">
      <div>Cargando experiencia AR...<br/>Por favor espera...</div>
    </div>

    <a-scene
      vr-mode-ui="enabled: false;"
      renderer="logarithmicDepthBuffer: true; precision: medium;"
      embedded
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

      <a-assets>
        <video
          id="mi-video"
          src="./assets/Loom_Operation_and_Direct_Gaze.mp4"
          preload="auto"
          autoplay
          loop
          muted
          playsinline>
        </video>
      </a-assets>

      <a-nft
        type="nft"
        url="./assets/otavalango-museo-viviente"
        smooth="true"
        smoothCount="10"
        smoothTolerance="0.01"
        smoothThreshold="5">

        <a-video
          src="#mi-video"
          width="1.6"
          height="0.9"
          position="0 0 0.1"
          rotation="-90 0 0">
        </a-video>

      </a-nft>

      <a-entity camera></a-entity>

    </a-scene>

    <script>
      const scene = document.querySelector("a-scene");
      const loader = document.getElementById("loader");

      scene.addEventListener("loaded", function () {
        loader.style.display = "none";
      });

      setTimeout(function () {
        loader.style.display = "none";
      }, 10000);
    </script>

  </body>
</html>
